<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── STATE ──
  let state = {
    cards: [],
    categories: [],
    expenses: [],
    settings: { weekly_budget: 300, budget_start_date: null },
    selectedWho: 'Ariel',
    fixedExpenses: []
  };

  // ── INIT ──
  async function init() {
    try {
      await Promise.all([loadSettings(), loadCards(), loadCategories(), loadExpenses(), loadFixed()]);
      renderAll();
      subscribeRealtime();
    } catch(e) {
      showToast('⚠️ Error conectando a Supabase');
      console.error(e);
    }
  }

  // ── LOADERS ──
  async function loadSettings() {
    const { data } = await db.from('settings').select('*').eq('id',1).single();
    if (data) state.settings = data;
  }

  async function loadCards() {
    const { data } = await db.from('cards').select('*').eq('is_active', true).order('owner').order('name');
    state.cards = data || [];
  }

  async function loadCategories() {
    const { data } = await db.from('categories').select('*').order('is_fixed', { ascending: false }).order('name');
    state.categories = data || [];
  }

  async function loadExpenses() {
    const { data } = await db.from('expenses')
      .select('*, cards(name,owner,color), categories(name,emoji)')
      .order('created_at', { ascending: false })
      .limit(200);
    state.expenses = data || [];
  }

  async function loadFixed() {
    const { data } = await db.from('fixed_expenses')
      .select('*, cards(name,owner)')
      .eq('is_active', true);
    state.fixedExpenses = data || [];
  }

  // ── REALTIME ──
  function subscribeRealtime() {
    db.channel('expenses-channel')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, async () => {
        await loadExpenses();
        renderAll();
        document.getElementById('liveDot').style.background = 'var(--accent)';
        setTimeout(() => document.getElementById('liveDot').style.background = 'var(--green)', 800);
      })
      .subscribe(status => {
        document.getElementById('liveDot').style.background =
          status === 'SUBSCRIBED' ? 'var(--green)' : 'var(--yellow)';
      });
  }

  // ── BUDGET CALC ──
  function getBudgetInfo() {
    const startDate = new Date(state.settings.budget_start_date || new Date());
    // Normalize to Monday of start week
    const start = new Date(startDate);
    start.setHours(0,0,0,0);

    const now = new Date();
    now.setHours(0,0,0,0);

    const msPerWeek = 7 * 24 * 60 * 60 * 1000;
    const weeksElapsed = Math.floor((now - start) / msPerWeek);
    const weekNum = weeksElapsed + 1;

    const totalBudget = (weeksElapsed + 1) * state.settings.weekly_budget;
    const totalSpent = state.expenses.reduce((s, e) => s + parseFloat(e.amount), 0);
    const available = totalBudget - totalSpent;
    const pct = Math.min(totalSpent / totalBudget, 1);

    // Current week range
    const weekStart = new Date(start.getTime() + weeksElapsed * msPerWeek);
    const weekEnd = new Date(weekStart.getTime() + msPerWeek - 1);
    const weekSpent = state.expenses
      .filter(e => {
        const d = new Date(e.created_at);
        return d >= weekStart && d <= weekEnd;
      })
      .reduce((s, e) => s + parseFloat(e.amount), 0);

    return { totalBudget, totalSpent, available, pct, weekNum, weekSpent, weekStart, weekEnd };
  }

  function fmt(n) {
    return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('es-MX', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  // ── RENDER ALL ──
  function renderAll() {
    renderHeader();
    renderForm();
    renderExpenseList();
    renderWeeks();
    renderSettings();
  }

  function renderHeader() {
    const info = getBudgetInfo();
    const { available, totalSpent, pct, weekNum, weekStart, weekEnd } = info;
    const budget = state.settings.weekly_budget;

    // Week label
    const opts = { month: 'short', day: 'numeric' };
    document.getElementById('weekLabel').textContent =
      `${weekStart.toLocaleDateString('es-MX', opts)} – ${weekEnd.toLocaleDateString('es-MX', opts)}`;

    // Ring
    const circumference = 327;
    const offset = circumference * pct;
    const ring = document.getElementById('ringFill');
    ring.style.strokeDashoffset = offset;
    ring.style.stroke = pct >= 1 ? 'var(--red)' : pct >= 0.85 ? 'var(--yellow)' : 'var(--green)';

    document.getElementById('ringAmount').textContent = fmt(available);
    document.getElementById('ringAmount').style.color =
      available < 0 ? 'var(--red)' : available < budget * 0.15 ? 'var(--yellow)' : 'var(--text)';

    document.getElementById('statSpent').textContent = fmt(totalSpent);
    document.getElementById('statBudget').textContent = fmt(budget * weekNum);
    document.getElementById('statWeekNum').textContent = `S${weekNum}`;

    // Alert
    const banner = document.getElementById('alertBanner');
    banner.className = 'alert-banner';
    if (pct >= 1) {
      banner.classList.add('over');
      banner.innerHTML = `🚨 ¡Te pasaste del presupuesto! — ${fmt(Math.abs(available))} de más`;
    } else if (pct >= 0.90) {
      banner.classList.add('warn');
      banner.innerHTML = `⚠️ Casi al límite — solo ${fmt(available)} disponibles`;
    } else if (pct >= 0.75) {
      banner.classList.add('warn');
      banner.innerHTML = `🔶 Llevas el 75% del presupuesto`;
    }
  }

  function renderForm() {
    // Cards select filtered by who
    const cardSel = document.getElementById('selectCard');
    const filtered = state.cards.filter(c => c.owner === state.selectedWho);
    cardSel.innerHTML = filtered.map(c =>
      `<option value="${c.id}">${c.name}</option>`
    ).join('');

    // Categories select
    const catSel = document.getElementById('selectCategory');
    catSel.innerHTML = state.categories.map(c =>
      `<option value="${c.id}">${c.emoji} ${c.name}</option>`
    ).join('');
  }

  function renderExpenseList() {
    const list = document.getElementById('expenseList');
    if (!state.expenses.length) {
      list.innerHTML = '<div class="empty">Sin gastos registrados aún</div>';
      return;
    }
    list.innerHTML = state.expenses.map(e => `
      <div class="expense-item">
        <div class="exp-emoji">${e.categories?.emoji || '📦'}</div>
        <div class="exp-info">
          <div class="exp-store">
            ${e.store}
            ${e.is_fixed ? '<span class="fixed-tag">FIJO</span>' : ''}
          </div>
          <div class="exp-meta">${fmtDate(e.created_at)} · ${e.recorded_by} ${e.note ? '· ' + e.note : ''}</div>
        </div>
        <div class="exp-right">
          <div class="exp-amount" style="color:${e.is_fixed ? 'var(--fixed)' : 'var(--red)'}">
            -${fmt(e.amount)}
          </div>
          <div class="exp-card" style="color:${e.cards?.color || 'var(--muted)'}">
            ${e.cards?.name || '—'}
          </div>
        </div>
        <button class="delete-btn" onclick="deleteExpense('${e.id}')">🗑</button>
      </div>
    `).join('');
  }

  function renderWeeks() {
    const container = document.getElementById('weeksList');
    const start = new Date(state.settings.budget_start_date || new Date());
    start.setHours(0,0,0,0);
    const msPerWeek = 7 * 24 * 60 * 60 * 1000;
    const now = new Date();
    const weeksElapsed = Math.floor((now - start) / msPerWeek);
    const budget = state.settings.weekly_budget;

    if (weeksElapsed < 0) {
      container.innerHTML = '<div class="empty">El presupuesto aún no ha comenzado</div>';
      return;
    }

    let html = '';
    for (let w = weeksElapsed; w >= 0; w--) {
      const ws = new Date(start.getTime() + w * msPerWeek);
      const we = new Date(ws.getTime() + msPerWeek - 1);
      const spent = state.expenses
        .filter(e => { const d = new Date(e.created_at); return d >= ws && d <= we; })
        .reduce((s, e) => s + parseFloat(e.amount), 0);
      const pct = Math.min(spent / budget, 1);
      const color = pct >= 1 ? 'var(--red)' : pct >= 0.85 ? 'var(--yellow)' : 'var(--green)';
      const opts = { month: 'short', day: 'numeric' };
      html += `
        <div class="week-card">
          <div class="week-card-header">
            <span class="week-card-title">Semana ${w + 1} · ${ws.toLocaleDateString('es-MX', opts)} – ${we.toLocaleDateString('es-MX', opts)}</span>
            <span class="week-card-total" style="color:${color}">${fmt(spent)}</span>
          </div>
          <div class="week-bar">
            <div class="week-bar-fill" style="width:${pct*100}%;background:${color}"></div>
          </div>
        </div>
      `;
    }
    container.innerHTML = html || '<div class="empty">Sin datos aún</div>';
  }

  function renderSettings() {
    document.getElementById('inputBudget').value = state.settings.weekly_budget;

    // Cards list
    const cl = document.getElementById('cardsList');
    // Load all cards (including inactive) for settings
    db.from('cards').select('*').order('owner').order('name').then(({ data }) => {
      if (!data) return;
      cl.innerHTML = data.map(c => `
        <div class="card-row">
          <div style="display:flex;align-items:center;flex:1;gap:6px;min-width:0;">
            <span class="card-dot" style="background:${c.color}"></span>
            <span class="card-name">${c.name}</span>
          </div>
          <span class="card-owner-tag">${c.owner}</span>
          <button class="toggle-active ${c.is_active ? 'on' : ''}" 
            onclick="toggleCard('${c.id}', ${c.is_active})" title="${c.is_active ? 'Activa' : 'Inactiva'}">
          </button>
        </div>
      `).join('');
    });

    // Fixed expenses
    const fl = document.getElementById('fixedList');
    const freqLabel = { weekly: 'semanal', monthly: 'mensual', annual: 'anual' };
    fl.innerHTML = state.fixedExpenses.length
      ? state.fixedExpenses.map(f => `
        <div class="card-row">
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600">${f.name}</div>
            <div style="font-size:11px;color:var(--muted)">${freqLabel[f.frequency]} · ${f.cards?.name || '—'}</div>
          </div>
          <span style="font-size:15px;font-weight:700;color:var(--fixed)">${fmt(f.amount)}</span>
        </div>
      `).join('')
      : '<div style="font-size:13px;color:var(--muted);padding:8px 0">Sin gastos fijos configurados</div>';
  }

  // ── ACTIONS ──
  function selectWho(who) {
    state.selectedWho = who;
    document.getElementById('whoAriel').classList.toggle('selected', who === 'Ariel');
    document.getElementById('whoPaty').classList.toggle('selected', who === 'Paty');
    renderForm();
  }

  async function addExpense() {
    const amount = parseFloat(document.getElementById('inputAmount').value);
    const store = document.getElementById('inputStore').value.trim();
    const card_id = document.getElementById('selectCard').value;
    const category_id = document.getElementById('selectCategory').value;
    const note = document.getElementById('inputNote').value.trim();

    if (!amount || amount <= 0) return showToast('⚠️ Ingresa un monto válido');
    if (!store) return showToast('⚠️ Ingresa tienda o lugar');
    if (!card_id) return showToast('⚠️ Selecciona una tarjeta');

    const cat = state.categories.find(c => c.id === category_id);
    const is_fixed = cat?.is_fixed || false;

    const btn = document.getElementById('btnAdd');
    btn.disabled = true;
    btn.textContent = 'Guardando…';

    const { error } = await db.from('expenses').insert({
      amount, store, card_id, category_id, note, is_fixed,
      recorded_by: state.selectedWho
    });

    btn.disabled = false;
    btn.textContent = '+ Registrar gasto';

    if (error) { showToast('❌ Error al guardar'); console.error(error); return; }

    document.getElementById('inputAmount').value = '';
    document.getElementById('inputStore').value = '';
    document.getElementById('inputNote').value = '';
    showToast(`✅ Gasto de ${fmt(amount)} registrado`);
  }

  async function deleteExpense(id) {
    if (!confirm('¿Eliminar este gasto?')) return;
    await db.from('expenses').delete().eq('id', id);
    showToast('🗑 Gasto eliminado');
  }

  async function saveBudget() {
    const val = parseFloat(document.getElementById('inputBudget').value);
    if (!val || val <= 0) return showToast('⚠️ Monto inválido');
    await db.from('settings').update({ weekly_budget: val }).eq('id', 1);
    state.settings.weekly_budget = val;
    renderAll();
    showToast('✅ Presupuesto actualizado');
  }

  async function toggleCard(id, currentActive) {
    await db.from('cards').update({ is_active: !currentActive }).eq('id', id);
    await loadCards();
    renderSettings();
    renderForm();
  }

  function toggleAddCardForm() {
    const f = document.getElementById('addCardForm');
    f.style.display = f.style.display === 'none' ? 'flex' : 'none';
  }

  async function saveNewCard() {
    const name = document.getElementById('newCardName').value.trim();
    const owner = document.getElementById('newCardOwner').value;
    const color = document.getElementById('newCardColor').value;
    if (!name) return showToast('⚠️ Ingresa el nombre de la tarjeta');
    await db.from('cards').insert({ name, owner, color });
    await loadCards();
    renderSettings();
    renderForm();
    document.getElementById('newCardName').value = '';
    toggleAddCardForm();
    showToast('✅ Tarjeta agregada');
  }

  // ── NAV ──
  function showSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`sec-${name}`).classList.add('active');
    document.getElementById(`nav-${name}`).classList.add('active');
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── START ──
  init();
</script>
</body>
</html>
